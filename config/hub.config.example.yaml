# ─────────────────────────────────────────────────────────────────────────
# Claude Ops Hub — configuration TEMPLATE
#
# Copy this file to `hub.config.yaml` (git-ignored) and fill in real values.
# NOTHING project-specific is hardcoded elsewhere — this file is the only
# place your org/project/connector details live. Swap it and the hub is
# instantly repurposed for a different project.
# ─────────────────────────────────────────────────────────────────────────

# Human-readable name of the project this hub serves (used in digest titles).
project_name: "CHANGEME"

# Which connectors the workflows should read from. Toggle off what you don't use.
# Auth for these lives in the Claude app / MCP connectors, NOT here.
connectors:
  sentry:
    enabled: false
    org: "your-sentry-org-slug"
    projects: []          # e.g. ["backend", "worker"]; empty = all
  gitlab:
    enabled: false
    group: "your-gitlab-group"     # top-level group to scan
    # what the daily brief flags:
    flag_failed_pipelines: true
    flag_stale_mrs_days: 3         # MRs with no activity for N days
  notion:
    enabled: false
    workspace: "your-notion-workspace"
    watch_pages: []       # page/database IDs to watch for changes
  slack:
    enabled: false
    channels: []          # channel names to skim for the brief

# Scheduling — where each periodic job runs.
#   cloud  = claude.ai scheduled agent (runs laptop-off, notifies phone)
#   local  = cron / /loop on this machine (needs local repo checkout)
schedules:
  daily_brief:
    when: "0 8 * * 1-5"   # cron: 08:00 on weekdays
    run: cloud
  sentry_regressions:
    when: "0 */4 * * *"   # every 4 hours
    run: cloud

# Long-term memory.
memory:
  # claude-mem is the automatic engine (SQLite + local Chroma). Nothing to set.
  # The Obsidian vault below is the curated, browsable knowledge graph.
  vault_path: "./vault"
  vault_mode: "zettelkasten"   # or: para | lyt | generic

# Where generated HTML outputs land (git-ignored).
output_dir: "./data"
